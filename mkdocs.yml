site_name: find-my-ride docs
site_description: Documentation and project memory for find-my-ride
site_url: https://niels-emmer.github.io/find-my-ride/

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Decisions: decisions.md
  - Dev Guide: dev-guide.md
  - API Reference: api-reference.md
  - Security: security.md

theme:
  name: readthedocs
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
