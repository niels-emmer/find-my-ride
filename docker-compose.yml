services:
  db:
    image: postgres:16-alpine
    container_name: find-my-ride-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: find-my-ride-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/uploads}
      MAX_PHOTOS_PER_RECORD: ${MAX_PHOTOS_PER_RECORD:-3}
      MAX_PHOTO_SIZE_MB: ${MAX_PHOTO_SIZE_MB:-8}
      MFA_ISSUER: ${MFA_ISSUER:-find-my-ride}
      REFRESH_TOKEN_COOKIE_NAME: ${REFRESH_TOKEN_COOKIE_NAME:-fmr_refresh_token}
      REFRESH_TOKEN_COOKIE_SECURE: ${REFRESH_TOKEN_COOKIE_SECURE:-false}
      REFRESH_TOKEN_COOKIE_SAMESITE: ${REFRESH_TOKEN_COOKIE_SAMESITE:-lax}
      REFRESH_TOKEN_COOKIE_PATH: ${REFRESH_TOKEN_COOKIE_PATH:-/api/auth}
    volumes:
      - ./backend:/app
      - ./data/uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: find-my-ride-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:8000}
      VITE_APP_VERSION: ${APP_VERSION:-dev-local}
      VITE_RELEASE_SHA: ${RELEASE_SHA:-local}
      VITE_REPO_URL: ${REPO_URL:-https://github.com/niels-emmer/find-my-ride}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
